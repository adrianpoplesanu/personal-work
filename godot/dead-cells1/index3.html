<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maze World — Dead Cells Style</title>
  <link rel="stylesheet" href="style3.css">
</head>
<body>
  <div class="game-container">
    <h1>Maze World — Graph / Path</h1>
    <canvas id="gameCanvas3" width="2400" height="2400"></canvas>
    <p class="legend">
      <span class="legend-blocked">■ Blocked</span>
      <span class="legend-maze">■ Traversable (red = blocked edge)</span>
    </p>
    <p class="hint">Press <kbd>R</kbd> to regenerate the world</p>
  </div>
  <script src="game3.js"></script>
</body>
</html>
